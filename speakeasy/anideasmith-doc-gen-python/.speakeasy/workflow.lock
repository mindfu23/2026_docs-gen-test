            registry:
                location: registry.speakeasyapi.dev/anideasmith/mindfu/open-5-e-—-demo-subset
    targets:
        anideasmith-doc-gen:
            target: python
            source: Open5e — demo subset
            codeSamples:
                registry:
                    location: registry.speakeasyapi.dev/anideasmith/mindfu/open-5-e-—-demo-subset-python-code-samples
                labelOverride:
                    fixedValue: Python (SDK)
                blocking: false
