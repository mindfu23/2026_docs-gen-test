speakeasyVersion: 1.785.0
sources: {}
targets:
    anideasmith-doc-gen:
        source: Open5e — demo subset
workflow:
    workflowVersion: 1.0.0
    speakeasyVersion: latest
    sources:
        Open5e — demo subset:
            inputs:
                - location: ../../shared/openapi-subset.json
            overlays:
